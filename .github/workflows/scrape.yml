name: Update Gas Prices JSON

on:
  schedule:
    # This runs at 13:00 and 21:00 UTC every day
    # Which corresponds to 8:00 AM and 4:00 PM EST
    - cron: '0 13,21 * * *'
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager
          
      - name: Run Scraper
        run: python scripts/scraper.py
        
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/gas_prices.json
          git commit -m "Update gas_prices.json" || echo "No changes"
          git push
