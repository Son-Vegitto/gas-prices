name: Update Gas Prices JSON

on:
  schedule:
    # Runs every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: Update Gas Prices
        run: node scripts/updateGas.js
        env:
          # This maps the GitHub Secret to an Environment Variable
          WEB_SCRAPING_AI_KEY: ${{ secrets.WEB_SCRAPING_AI_KEY }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/gas_prices.json
          git commit -m "Update gas_prices.json" || echo "No changes"
          git push
