name: Update Gas Prices JSON

on:
  schedule:
    # Runs every 6 hours (at minute 0 of 00:00, 06:00, 12:00, 18:00)
    # This is plenty for gas prices and avoids getting flagged by GasBuddy.
    - cron: "0 */6 * * *"

  workflow_dispatch: # Allows you to run it manually whenever you want

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: Update Gas Prices
        # Assuming you named your script scripts/updateGas.js
        run: node scripts/updateGas.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/gas_prices.json
          git commit -m "Update gas_prices.json" || echo "No changes"
          git push
